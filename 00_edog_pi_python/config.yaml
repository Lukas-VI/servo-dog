camera_index: 0
frame_width: 240
frame_height: 180
loop_hz: 14.0
serial_port: /dev/serial0
serial_baud: 9600
stand_height: 144
runtime_status_path: /tmp/edog_runtime_status.json
vision_status_path: /tmp/edog_vision_status.json
vision_frame_path: /tmp/edog_vision_frame.jpg
pid:
  kp_side: 0.12
  kd_side: 0.04
  kp_yaw: 0.80
  kd_yaw: 0.18
  forward_speed: 0.18
  max_side: 0.22
  max_yaw: 0.90
  min_track_confidence: 0.18
  lost_rescue_s: 0.45
  lost_rescue_decay: 0.72
branch:
  default_turn: straight
  fork_confidence: 0.18
  turn_bias: 0.28
  branch_error_blend: 0.85
  fork_speed_factor: 0.88
  branch_latch_s: 0.75
vision:
  roi_start_ratio: 0.48
  gate_top_width_ratio: 0.66
  gate_bottom_width_ratio: 0.96
  exclude_background: true
  stripe_min_width_ratio: 0.08
  stripe_max_width_ratio: 0.82
  temporal_smoothing: 0.35
gamepad:
  transport: usb
  web_command_path: /tmp/edog_web_gamepad.json
  axis_forward: 4
  axis_side: 3
  axis_yaw: 0
  axis_height: 1
  axis_roll: -1
  axis_pitch: -1
  axis_left_trigger: -1
  axis_right_trigger: -1
  button_emergency_stop: 1
  button_manual: 4
  manual_button_required: false
  max_forward: 0.35
  max_side: 0.25
  max_yaw: 0.85
  max_roll: 0.0
  max_pitch: 0.0
  min_height: 100
  max_height: 180
  height_step: 1.8
  height_axis_step: 1.8
  deadzone: 0.10
  gait: 2
  mode_buttons:
    0: track
    2: stop
    3: byroad_a
    5: byroad_b
  action_buttons:
    6: lean_left
    7: lean_right
colors_hsv:
  blue:
    min: [95, 70, 40]
    max: [130, 255, 255]
  green:
    min: [40, 60, 40]
    max: [85, 255, 255]
  purple:
    min: [125, 40, 40]
    max: [165, 255, 255]
  brown:
    min: [5, 45, 30]
    max: [25, 230, 220]
  black:
    min: [0, 0, 0]
    max: [180, 255, 80]
task_graph:
  nodes:
    - id: start
      label: 集散中心
      type: track
      color: black
      action: ""
      x: 90
      y: 285
    - id: speed_bump
      label: 减速带
      type: track
      color: black
      action: ""
      x: 190
      y: 220
    - id: fork
      label: 分岔口
      type: fork
      color: green
      action: ""
      x: 315
      y: 170
    - id: purple_resident
      label: 紫色住户
      type: resident
      color: purple
      action: lean_right
      x: 490
      y: 95
    - id: brown_resident
      label: 棕色住户
      type: resident
      color: brown
      action: lean_left
      x: 490
      y: 235
    - id: platform
      label: 上下高台
      type: track
      color: blue
      action: updais
      x: 315
      y: 300
    - id: finish
      label: 回到集散中心
      type: stop
      color: black
      action: stop
      x: 90
      y: 330
  edges:
    - from: start
      to: speed_bump
      condition: 出发
    - from: speed_bump
      to: fork
      condition: 减速带通过
    - from: fork
      to: purple_resident
      condition: 左岔/紫色
    - from: fork
      to: brown_resident
      condition: 右岔/棕色
    - from: purple_resident
      to: platform
      condition: 投递后继续循迹
    - from: brown_resident
      to: platform
      condition: 投递后继续循迹
    - from: platform
      to: finish
      condition: 返回
slam_demo:
  enabled: true
  mode: feature_odometry
  feature_count: 90
  map_decay: 0.94
  motion_scale: 1.0
  loop_threshold: 0.42
