<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>e-Dog Vision Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>e-Dog Vision Studio</h1>
        <p>颜色阈值、转向参数、任务图调试</p>
      </div>
      <div class="top-actions">
        <button id="loadConfigBtn" class="icon-btn" title="从后端读取配置">↻</button>
        <button id="saveConfigBtn" class="primary">保存配置</button>
        <button id="exportBtn">导出 YAML</button>
      </div>
    </header>

    <main class="workspace">
      <section class="preview-pane">
        <div class="pane-head">
          <div>
            <h2>视觉预览</h2>
            <span id="sourceLabel">未选择图像</span>
          </div>
          <button id="liveBtn" class="primary">实时摄像头</button>
          <button id="pauseLiveBtn">暂停</button>
          <label class="file-btn">
            打开图片
            <input id="imageInput" type="file" accept="image/*" />
          </label>
        </div>
        <div class="canvas-grid">
          <figure>
            <canvas id="sourceCanvas" width="640" height="420"></canvas>
            <figcaption>原始帧</figcaption>
          </figure>
          <figure>
            <canvas id="maskCanvas" width="640" height="420"></canvas>
            <figcaption>阈值掩膜</figcaption>
          </figure>
        </div>
        <div class="preview-footer">
          <label>
            当前颜色
            <select id="activeColor"></select>
          </label>
          <label>
            叠加透明度
            <input id="overlayAlpha" type="range" min="0" max="100" value="62" />
          </label>
          <div class="metric">
            <strong id="maskRatio">0.0%</strong>
            <span>命中像素</span>
          </div>
        </div>
      </section>

      <aside class="inspector">
        <nav class="tabs" aria-label="debug sections">
          <button class="tab active" data-tab="colors">阈值</button>
          <button class="tab" data-tab="steering">转向</button>
          <button class="tab" data-tab="tasks">任务图</button>
          <button class="tab" data-tab="slam">SLAM</button>
        </nav>

        <section id="colorsTab" class="tab-panel active">
          <div id="colorEditor" class="color-editor"></div>
        </section>

        <section id="steeringTab" class="tab-panel">
          <div class="control-grid" id="pidEditor"></div>
          <div class="steering-sim">
            <canvas id="steeringCanvas" width="520" height="180"></canvas>
            <div class="sim-readout">
              <span>side <strong id="sideOut">0.000</strong></span>
              <span>yaw <strong id="yawOut">0.000</strong></span>
            </div>
          </div>
        </section>

        <section id="tasksTab" class="tab-panel">
          <div class="task-tools">
            <button id="addTaskBtn" class="primary">新增节点</button>
            <button id="addEdgeBtn">新增连线</button>
          </div>
          <svg id="taskGraph" viewBox="0 0 680 360" role="img" aria-label="task graph"></svg>
          <div id="taskEditor" class="task-editor"></div>
        </section>

        <section id="slamTab" class="tab-panel">
          <div class="slam-toolbar">
            <button id="slamRunBtn" class="primary">运行 demo</button>
            <button id="slamStepBtn">单步</button>
            <button id="slamResetBtn">重置</button>
          </div>
          <canvas id="slamCanvas" width="680" height="420"></canvas>
          <div class="slam-stats">
            <div><strong id="slamFrame">0</strong><span>frame</span></div>
            <div><strong id="slamFeatures">0</strong><span>features</span></div>
            <div><strong id="slamLoop">idle</strong><span>loop</span></div>
          </div>
          <div class="control-grid" id="slamEditor"></div>
        </section>
      </aside>
    </main>

    <section class="config-drawer">
      <div class="drawer-head">
        <h2>配置预览</h2>
        <span id="saveState">本地未保存</span>
      </div>
      <textarea id="yamlOutput" spellcheck="false"></textarea>
    </section>

    <script src="main.js"></script>
  </body>
</html>
